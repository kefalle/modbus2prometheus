services:
  modbus2prometheus:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: modbus2prometheus
    volumes:
      - /etc/modbus2prometheus.config.yaml:/app/config.yaml:ro
    command: ["./modbus2prometheus", "-config", "/app/config.yaml"]
    restart: unless-stopped
    network_mode: host

  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: grafana
  #   volumes:
  #     - ./grafana.ini:/etc/grafana/grafana.ini:ro
  #   restart: unless-stopped
  #   networks:
  #     - proxy

  proxy:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: proxy
    network_mode: host
    depends_on:
      - modbus2prometheus
    restart: unless-stopped

networks:
  proxy:
    driver: bridge
